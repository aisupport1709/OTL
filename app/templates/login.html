<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OTL Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center justify-center gap-2">
                <i class="bi bi-bar-chart-line-fill text-blue-500"></i> OTL Reports
            </h1>
            <p class="text-gray-500 mt-1">Sign in to your account</p>
            {% if app_name %}
            <p class="text-sm text-blue-600 mt-2 flex items-center justify-center gap-1">
                <i class="bi bi-info-circle"></i> Sign in to continue to <strong>{{ app_name }}</strong>
            </p>
            {% endif %}
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="mb-4 p-3 rounded-lg text-sm
                {% if category == 'danger' %}bg-red-50 text-red-700 border border-red-200
                {% elif category == 'success' %}bg-green-50 text-green-700 border border-green-200
                {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Tab Buttons -->
            <div class="flex gap-0 mb-6 bg-gray-200 p-1 rounded-lg">
                <button type="button" onclick="switchTab('password')"
                    id="btn-password" class="flex-1 py-2 px-4 text-sm font-medium text-white bg-blue-600 rounded-md transition">
                    <i class="bi bi-lock"></i> Password
                </button>
                <button type="button" onclick="switchTab('key')"
                    id="btn-key" class="flex-1 py-2 px-4 text-sm font-medium text-gray-600 hover:bg-gray-300 rounded-md transition">
                    <i class="bi bi-key"></i> Shared Key
                </button>
            </div>

            <!-- Password Tab -->
            <form method="POST" id="form-password" class="space-y-5">
                <input type="hidden" name="login_method" value="password">
                <input type="hidden" name="redirect" value="{{ redirect }}">

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition shadow">
                    Sign In
                </button>
            </form>

            <!-- Shared Key Tab -->
            <form method="POST" id="form-key" class="space-y-5 hidden">
                <input type="hidden" name="login_method" value="key">
                <input type="hidden" name="redirect" value="{{ redirect }}">

                <div>
                    <label for="key" class="block text-sm font-medium text-gray-700 mb-1">Shared Key (5 characters)</label>
                    <input type="text" id="key" name="key" maxlength="5" required autofocus
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-center text-lg tracking-widest"
                        placeholder="e.g., aB3!x">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition shadow">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const formPassword = document.getElementById('form-password');
            const formKey = document.getElementById('form-key');
            const btnPassword = document.getElementById('btn-password');
            const btnKey = document.getElementById('btn-key');

            if (tab === 'password') {
                formPassword.classList.remove('hidden');
                formKey.classList.add('hidden');
                btnPassword.classList.add('bg-blue-600', 'text-white');
                btnPassword.classList.remove('text-gray-600', 'hover:bg-gray-300');
                btnKey.classList.remove('bg-blue-600', 'text-white');
                btnKey.classList.add('text-gray-600', 'hover:bg-gray-300');
                document.getElementById('username').focus();
            } else if (tab === 'key') {
                formPassword.classList.add('hidden');
                formKey.classList.remove('hidden');
                btnPassword.classList.remove('bg-blue-600', 'text-white');
                btnPassword.classList.add('text-gray-600', 'hover:bg-gray-300');
                btnKey.classList.add('bg-blue-600', 'text-white');
                btnKey.classList.remove('text-gray-600', 'hover:bg-gray-300');
                document.getElementById('key').focus();
            }
        }
    </script>
</body>
</html>
