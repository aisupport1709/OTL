<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OTL Reports{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sidebar: { DEFAULT: '#0f172a', hover: '#1e293b' },
                    }
                }
            }
        }
    </script>
    <style>
        .chart-container { position: relative; min-height: 300px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <nav class="w-60 bg-sidebar fixed top-0 left-0 h-full text-white flex flex-col z-50 shadow-xl">
            <div class="px-5 py-4 border-b border-white/10">
                <h1 class="text-lg font-bold tracking-wide flex items-center gap-2">
                    <i class="bi bi-bar-chart-line-fill text-blue-400"></i> OTL Reports
                </h1>
            </div>
            <ul class="flex-1 mt-2">
                <li>
                    <a href="/" class="flex items-center gap-3 px-5 py-3 text-sm transition-all border-l-[3px]
                        {% if request.path == '/' %}border-blue-400 bg-blue-400/10 text-white font-medium{% else %}border-transparent text-white/60 hover:text-white hover:bg-white/5{% endif %}">
                        <i class="bi bi-speedometer2 text-base"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="/import" class="flex items-center gap-3 px-5 py-3 text-sm transition-all border-l-[3px]
                        {% if request.path == '/import' %}border-blue-400 bg-blue-400/10 text-white font-medium{% else %}border-transparent text-white/60 hover:text-white hover:bg-white/5{% endif %}">
                        <i class="bi bi-cloud-upload text-base"></i> Import Data
                    </a>
                </li>
                <li>
                    <a href="/data" class="flex items-center gap-3 px-5 py-3 text-sm transition-all border-l-[3px]
                        {% if request.path == '/data' %}border-blue-400 bg-blue-400/10 text-white font-medium{% else %}border-transparent text-white/60 hover:text-white hover:bg-white/5{% endif %}">
                        <i class="bi bi-table text-base"></i> Invoice Data
                    </a>
                </li>
                <li>
                    <a href="/settings" class="flex items-center gap-3 px-5 py-3 text-sm transition-all border-l-[3px]
                        {% if request.path == '/settings' %}border-blue-400 bg-blue-400/10 text-white font-medium{% else %}border-transparent text-white/60 hover:text-white hover:bg-white/5{% endif %}">
                        <i class="bi bi-gear text-base"></i> Settings
                    </a>
                </li>
            </ul>
            <div class="px-5 py-3 border-t border-white/10 text-xs text-white/40">
                <div class="flex items-center justify-between">
                    <span>{{ session.get('display_name', 'User') }}</span>
                    <a href="/logout" class="text-white/50 hover:text-white transition"><i class="bi bi-box-arrow-right"></i></a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="ml-60 flex-1 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
